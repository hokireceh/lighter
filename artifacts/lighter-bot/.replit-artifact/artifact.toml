kind = "web"
previewPath = "/"
title = "Lighter Trading Bot"
version = "1.0.0"
id = "artifacts/lighter-bot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24148

[services.development]
run = "pnpm --filter @workspace/lighter-bot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lighter-bot", "run", "build" ]
publicDir = "artifacts/lighter-bot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24148"
BASE_PATH = "/"
