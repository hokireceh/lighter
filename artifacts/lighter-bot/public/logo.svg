<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0fd4aa"/>
      <stop offset="100%" stop-color="#0a8f72"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="64" height="64" rx="16" fill="url(#shine)"/>
  <!-- H lettermark -->
  <rect x="14" y="16" width="8" height="32" rx="3" fill="white"/>
  <rect x="42" y="16" width="8" height="32" rx="3" fill="white"/>
  <rect x="14" y="27" width="36" height="10" rx="3" fill="white"/>
